<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="detail.title">পণ্য — ইশপ</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header>

    <nav>

      <a href="/admin/" data-i18n="nav.admin">অ্যাডমিন</a>
       <button class="lang-toggle" onclick="toggleLang()" id="langToggle">EN</button>
       <a href="/auth.html" id="authLink" data-no-i18n="1">লগইন</a>
    </nav>
  </div>
</header>

<div class="container" id="productDetail"></div>

<footer>
  <div class="container">
    <p data-i18n="footer.copyright">&copy; 2026 ইশপ</p>
  </div>
</footer>

<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/products.js"></script>

</html>
