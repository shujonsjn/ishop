<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>পণ্য — ইশপ</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo">ই<span>শপ</span></a>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="পণ্য খুঁজুন..." value="">
      <button onclick="doSearch()">খুঁজুন</button>
    </div>
    <nav>
      <a href="/">হোম</a>
      <a href="/products.html">পণ্য</a>
      <a href="/cart.html">কার্ট <span class="cart-icon">🛒<span class="cart-count" id="cartCount" style="display:none">0</span></span></a>
      <a href="/admin/">অ্যাডমিন</a>
      <a href="/auth.html" id="authLink">লগইন</a>
    </nav>
  </div>
</header>

<div class="container" style="padding-top:24px;">
  <div class="filters">
    <select id="categoryFilter" onchange="loadProducts()">
      <option value="">সব ক্যাটাগরি</option>
    </select>
    <select id="sortFilter" onchange="loadProducts()">
      <option value="newest">নতুন</option>
      <option value="price_asc">দাম (কম)</option>
      <option value="price_desc">দাম (বেশি)</option>
    </select>
  </div>

  <div class="product-grid" id="productGrid"></div>
  <div class="pagination" id="pagination"></div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <h3>কোনো পণ্য পাওয়া যায়নি</h3>
    <p>অন্য কীওয়ার্ড দিয়ে খুঁজুন</p>
  </div>
</div>

<footer>
  <div class="container">
    <p>&copy; 2026 ইশপ</p>
  </div>
</footer>

<script src="js/api.js"></script>
<script src="js/products.js"></script>
</body>
</html>
