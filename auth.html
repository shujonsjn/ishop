<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="auth.title">লগইন / রেজিস্টার — ইশপ</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo">ই<span>শপ</span></a>
    <nav>
      <a href="/" data-i18n="nav.home">হোম</a>
      <a href="/products.html" data-i18n="nav.products">পণ্য</a>
      <a href="/cart.html"><span data-i18n="nav.cart">কার্ট</span> <span class="cart-icon">🛒<span class="cart-count" id="cartCount" style="display:none">0</span></span></a>
      <a href="/admin/" data-i18n="nav.admin">অ্যাডমিন</a>
       <button class="lang-toggle" onclick="toggleLang()" id="langToggle">EN</button>
       <a href="/auth.html" id="authLink" data-no-i18n="1">লগইন</a>
    </nav>
  </div>
</header>

<div class="container">
  <div class="auth-form card">
    <h2 data-i18n="auth.welcome">স্বাগতম</h2>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')" data-i18n="auth.login_tab">লগইন</div>
      <div class="auth-tab" onclick="switchTab('register')" data-i18n="auth.register_tab">রেজিস্টার</div>
    </div>
    <div id="loginForm">
<div class="form-group">
        <label data-i18n="auth.email_or_phone">ইমেইল / ফোন</label>
        <input type="text" id="loginEmail" placeholder="your@email.com / ০১XXXXXXXXX" data-i18n-placeholder="auth.login_phone_hint">
      </div>
<div class="form-group">
        <label data-i18n="auth.password">পাসওয়ার্ড</label>
        <input type="password" id="loginPassword" placeholder="********">
      </div>
      <button class="btn btn-primary btn-block" onclick="doLogin()" data-i18n="auth.login_btn">লগইন করুন</button>
    </div>
    <div id="registerForm" style="display:none;">
<div class="form-group">
        <label data-i18n="auth.name">নাম</label>
        <input type="text" id="regName" placeholder="আপনার নাম" data-i18n-placeholder="auth.name_placeholder">
      </div>
<div class="form-group">
        <label data-i18n="auth.email">ইমেইল</label>
        <input type="email" id="regEmail" placeholder="your@email.com">
      </div>
<div class="form-group">
        <label data-i18n="auth.phone">ফোন</label>
        <input type="text" id="regPhone" placeholder="০১XXXXXXXXX" data-i18n-placeholder="auth.phone_placeholder">
      </div>
<div class="form-group">
        <label data-i18n="auth.password">পাসওয়ার্ড</label>
        <input type="password" id="regPassword" placeholder="********">
      </div>
      <button class="btn btn-primary btn-block" onclick="sendOtp()" id="sendOtpBtn" data-i18n="auth.send_otp">ওটিপি পাঠান</button>
      <div id="otpSection" style="display:none;">
        <div class="form-group" style="margin-top:12px;">
          <label data-i18n="auth.otp">ওটিপি</label>
          <input type="text" id="regOtp" placeholder="123456" maxlength="6" inputmode="numeric" pattern="[0-9]*" data-i18n-placeholder="auth.otp_placeholder" style="text-align:center;font-size:20px;letter-spacing:6px;font-weight:700;">
        </div>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-primary btn-block" onclick="doRegister()" id="registerBtn" data-i18n="auth.register_btn">রেজিস্টার করুন</button>
          <button class="btn btn-outline" onclick="sendOtp()" id="resendOtpBtn" disabled data-i18n="auth.resend_otp">পুনরায় পাঠান</button>
        </div>
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="container">
    <p data-i18n="footer.copyright">&copy; 2026 ইশপ</p>
  </div>
</footer>

<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
