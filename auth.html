<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>লগইন / রেজিস্টার — ইশপ</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo">ই<span>শপ</span></a>
    <nav>
      <a href="/">হোম</a>
      <a href="/products.html">পণ্য</a>
      <a href="/cart.html">কার্ট <span class="cart-icon">🛒<span class="cart-count" id="cartCount" style="display:none">0</span></span></a>
      <a href="/admin/">অ্যাডমিন</a>
      <a href="/auth.html" id="authLink">লগইন</a>
    </nav>
  </div>
</header>

<div class="container">
  <div class="auth-form card">
    <h2>স্বাগতম</h2>
    <div class="auth-tabs">
      <div class="auth-tab active" onclick="switchTab('login')">লগইন</div>
      <div class="auth-tab" onclick="switchTab('register')">রেজিস্টার</div>
    </div>
    <div id="loginForm">
      <div class="form-group">
        <label>ইমেইল</label>
        <input type="email" id="loginEmail" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>পাসওয়ার্ড</label>
        <input type="password" id="loginPassword" placeholder="********">
      </div>
      <button class="btn btn-primary btn-block" onclick="doLogin()">লগইন করুন</button>
    </div>
    <div id="registerForm" style="display:none;">
      <div class="form-group">
        <label>নাম</label>
        <input type="text" id="regName" placeholder="আপনার নাম">
      </div>
      <div class="form-group">
        <label>ইমেইল</label>
        <input type="email" id="regEmail" placeholder="your@email.com">
      </div>
      <div class="form-group">
        <label>ফোন</label>
        <input type="text" id="regPhone" placeholder="০১XXXXXXXXX">
      </div>
      <div class="form-group">
        <label>পাসওয়ার্ড</label>
        <input type="password" id="regPassword" placeholder="********">
      </div>
      <button class="btn btn-primary btn-block" onclick="doRegister()">রেজিস্টার করুন</button>
    </div>
  </div>
</div>

<footer>
  <div class="container">
    <p>&copy; 2026 ইশপ</p>
  </div>
</footer>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
