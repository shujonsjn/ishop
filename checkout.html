<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="checkout.title">চেকআউট — ইশপ</title>
<link rel="stylesheet" href="css/style.css?v=3.4">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="/uploads/ishop-logo.svg">
<script>
(function(){try{var s=JSON.parse(localStorage.getItem('siteSettings'));if(!s)return;var r=document.documentElement;var p=[['header_bg','--header-bg'],['header_text_color','--header-text'],['body_bg','--body-bg'],['primary_color','--primary'],['footer_bg','--footer-bg'],['footer_text_color','--footer-text']];p.forEach(function(k){if(s[k[0]])r.style.setProperty(k[1],s[k[0]]);});}catch(e){}})();
</script>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo" id="siteLogo">ই<span>শপ</span></a>
    <script>(function(){try{var s=JSON.parse(localStorage.getItem('siteSettings'));if(!s)return;var sn=s.site_name||'';var el=document.getElementById('siteLogo');if(el){if(s.logo_url){el.innerHTML='<img src="'+s.logo_url+'" alt="'+sn+'" style="height:48px;width:auto;" onerror="this.onerror=null;this.style.display=\'none\'">'+'<span class="site-name">'+sn+'</span>';}else if(sn.length>1){el.innerHTML=sn.charAt(0)+'<span>'+sn.slice(1)+'</span>';}else{el.textContent=sn;}}document.querySelectorAll('.dz-footer-bottom p').forEach(function(f){f.textContent=f.textContent.replace(/\u0987\u09b6\u09aa/g,sn).replace(/iShop/g,sn);});var ti=document.querySelector('title');if(ti)ti.textContent=ti.textContent.replace(/\u0987\u09b6\u09aa/g,sn).replace(/iShop/g,sn);if(s.header_show_search==='0'&&document.getElementById('searchBox'))document.getElementById('searchBox').style.display='none';if(s.header_show_home==='0'&&document.getElementById('navHome'))document.getElementById('navHome').style.display='none';if(s.header_show_products==='0'&&document.getElementById('navProducts'))document.getElementById('navProducts').style.display='none';if(s.header_show_cart==='0'&&document.getElementById('navCart'))document.getElementById('navCart').style.display='none';if(s.header_show_admin==='0'&&document.getElementById('navAdmin'))document.getElementById('navAdmin').style.display='none';if(s.header_show_lang==='0'&&document.getElementById('langToggle'))document.getElementById('langToggle').style.display='none';if(s.header_show_auth==='0'&&document.getElementById('authLink'))document.getElementById('authLink').style.display='none';if(s.header_padding){var hd=document.querySelector('header');if(hd)hd.style.padding=s.header_padding;}if(s.header_search_placeholder_bn){var si=document.getElementById('searchInput');if(si){var lg=localStorage.getItem('lang')||'bn';si.placeholder=lg==='en'&&s.header_search_placeholder_en?s.header_search_placeholder_en:s.header_search_placeholder_bn;}}if(s.header_show_orders==='0'){document.querySelectorAll('a[href*="profile.html#orders"]').forEach(function(a){a.style.display='none';});}if(s.header_show_orders==='1'){document.querySelectorAll('a[href*="profile.html#orders"]').forEach(function(a){a.style.display='';});}}catch(e){}})();
    </script>
    <div class="search-box" id="searchBox">
      <input type="text" id="searchInput" placeholder="পণ্য খুঁজুন..." data-i18n-placeholder="nav.search_placeholder">
      <button onclick="searchProducts()" data-i18n="nav.search_btn">খুঁজুন</button>
      <div class="search-suggestions" id="searchSuggestions"></div>
    </div>
    <nav>
      <a href="/" id="navHome" data-i18n="nav.home">হোম</a>
      <a href="/products.html" id="navProducts" data-i18n="nav.products">পণ্য</a>
      <a href="/cart.html" id="navCart"><span data-i18n="nav.cart">কার্ট</span> <span class="cart-icon">🛒<span class="cart-count" id="cartCount" style="display:none">0</span></span></a>
      <a href="/profile.html#orders" data-i18n="nav.orders" id="navOrders">অর্ডার</a>
      <a href="/admin/" data-i18n="nav.admin" id="navAdmin" style="display:none">অ্যাডমিন</a>
      <button class="lang-toggle" onclick="toggleLang()" id="langToggle">EN</button>
      <a href="/auth.html" id="authLink" data-no-i18n="1">লগইন</a>
    </nav>
  </div>
</header>

<div style="padding-top:24px;">
  <div id="coAuthWarning" style="display:none;text-align:center;padding:40px;background:var(--white);border-radius:var(--radius-lg);box-shadow:var(--shadow);max-width:var(--max-width);margin:0 auto;">
    <p style="font-size:var(--fs-lg);margin-bottom:16px;" data-i18n="checkout.login_required">অর্ডার করতে লগইন করুন</p>
    <a href="/auth.html" class="btn btn-primary" data-i18n="nav.login">লগইন</a>
  </div>

  <div class="checkout-form-wrap" style="display:grid;grid-template-columns:1fr 380px;gap:24px;align-items:start;max-width:var(--max-width);margin:0 auto;padding:0 16px;">
    <div>
      <h2 id="coPageTitle" style="margin-bottom:20px;" data-i18n="checkout.heading">চেকআউট</h2>
      <p id="coPageDesc" style="color:var(--gray);margin-bottom:20px;font-size:var(--fs-base);"></p>
      <div id="coFormFields" style="background:var(--white);border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow);"></div>
      <div id="coCustomNote"></div>
      <div style="margin-top:16px;display:flex;align-items:flex-start;gap:8px;">
        <input type="checkbox" id="coTerms" style="margin-top:4px;">
        <label for="coTerms" id="coTermsText" style="font-size:var(--fs-base);color:var(--gray);cursor:pointer;">আমি শর্তাবলী মেনে অর্ডার করছি</label>
      </div>
      <button class="btn btn-primary btn-block" onclick="placeOrder()" id="placeOrderBtn" style="margin-top:20px;padding:14px;font-size:var(--fs-lg);width:100%;" data-i18n="checkout.confirm_btn">অর্ডার কনফার্ম করুন</button>
    </div>
    <div style="background:var(--white);border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow);position:sticky;top:80px;">
      <h3 id="coSummaryTitle" style="margin-bottom:16px;font-size:var(--fs-xl);" data-i18n="checkout.summary">অর্ডার সারাংশ</h3>
      <div id="orderSummary"></div>
    </div>
  </div>
</div>

<footer class="dz-footer">
  <div class="dz-footer-inner"></div>
  <div class="dz-footer-bottom">
    <p data-i18n="footer.copyright">&copy; 2026 — সকল অধিকার সংরক্ষিত</p>
  </div>
</footer>

<script src="js/i18n-strings.js"></script>
<script>
(function(){
  try {
    var s = JSON.parse(localStorage.getItem('siteSettings') || '{}');
    var lang = localStorage.getItem('lang') || 'bn';
    var t = function(bn,en){ return lang==='en'?(en||bn):bn; };
    var d = document;
    var i18nKeys = window.__i18nStrings || {};
    d.querySelectorAll('[data-i18n]').forEach(function(el){
      var k = el.getAttribute('data-i18n');
      if(i18nKeys[k]) el.textContent = t(i18nKeys[k].bn,i18nKeys[k].en);
    });
    var ph = d.getElementById('searchInput');
    if(ph) ph.placeholder = t('পণ্য খুঁজুন...','Search products...');
    var lt = d.getElementById('langToggle');
    if(lt) lt.textContent = lang==='bn'?'EN':'বাংলা';
    var fc = null;
    try { fc = s.footer_content ? JSON.parse(s.footer_content) : null; } catch(e){}
    var fwrap = d.querySelector('.dz-footer .dz-footer-inner');
    if (fc && fc.length && fwrap) {
      fwrap.innerHTML = fc.map(function(col){
        var h = '<div class="dz-footer-col">';
        if(col.type==='payments'){
          h += '<h4>'+(lang==='en'?(col.titleEn||col.title):col.title)+'</h4>';
          h += '<div class="dz-footer-payments">';
          ['COD','VISA','MC','bKash','Nagad','Rocket'].forEach(function(b){h+='<span class="dz-pay-badge">'+b+'</span>';});
          h += '</div>';
        } else {
          if(col.title||col.titleEn) h += '<h4>'+(lang==='en'?(col.titleEn||col.title):col.title)+'</h4>';
          (col.links||[]).forEach(function(lnk){
            var txt = lang==='en'?(lnk.textEn||lnk.text):lnk.text;
            if(txt) h += '<a href="'+(lnk.url||'#')+'">'+txt+'</a>';
          });
        }
        return h+'</div>';
      }).join('');
    }
    var al = d.getElementById('authLink');
    if(al){
      var token = localStorage.getItem('token');
      if(token){ al.style.display='none'; }
      else { al.textContent=t('লগইন','Login'); al.href='/auth.html'; }
    }
    var adminLink = d.getElementById('navAdmin');
    if(adminLink){
      var tok = localStorage.getItem('token');
      if(!tok){ adminLink.style.display='none'; }
      else { try { var us=JSON.parse(localStorage.getItem('user')||'{}'); adminLink.style.display=us.role==='admin'?'':'none'; } catch(e){ adminLink.style.display='none'; } }
    }
  } catch(e){}
})();
</script>
<script src="js/i18n.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script>
loadCartCount();
window.searchProducts = function() {
  var q = document.getElementById("searchInput");
  if (q && q.value) window.location = "/products.html?search=" + encodeURIComponent(q.value);
};
</script>
<script src="js/bd-locations.js"></script>
<script src="js/checkout.js"></script>
</body>
</html>
