<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>পণ্য ব্যবস্থাপনা — ইশপ</title>
<link rel="stylesheet" href="../css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
.admin-layout { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 60px); }
.admin-sidebar { background: var(--dark); padding: 20px; }
.admin-sidebar a { display: block; color: #d1d5db; padding: 10px; border-radius: 6px; margin-bottom: 4px; }
.admin-sidebar a:hover, .admin-sidebar a.active { background: rgba(255,255,255,0.1); color: var(--white); }
.admin-content { padding: 24px; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/admin/" class="logo">ইশপ <span>অ্যাডমিন</span></a>
    <nav><a href="/">সাইটে যান</a></nav>
  </div>
</header>

<div class="admin-layout">
  <div class="admin-sidebar">
    <a href="/admin/">ড্যাশবোর্ড</a>
    <a href="/admin/products.html" class="active">পণ্য</a>
    <a href="/admin/categories.html">ক্যাটাগরি</a>
    <a href="/admin/orders.html">অর্ডার</a>
  </div>
  <div class="admin-content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <h2>পণ্য</h2>
      <button class="btn btn-primary" onclick="showProductForm()">+ নতুন পণ্য</button>
    </div>
    <div id="loginPrompt" style="display:none;">
      <p style="color:var(--gray);margin-bottom:12px;">অ্যাডমিন লগইন করুন</p>
      <div class="form-group"><input type="text" id="adminEmail" placeholder="admin@email.com"></div>
      <div class="form-group"><input type="password" id="adminPass" placeholder="password"></div>
      <button class="btn btn-primary" onclick="adminLogin()">লগইন</button>
    </div>
    <div id="productTableWrap"></div>
  </div>
</div>

<div id="productModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:999;overflow-y:auto;">
  <div style="max-width:700px;margin:40px auto;background:var(--white);padding:24px;border-radius:var(--radius);">
    <h3 id="modalTitle">নতুন পণ্য</h3>
    <div class="form-group"><label>নাম</label><input type="text" id="pfName"></div>
    <div class="form-group"><label>ক্যাটাগরি</label><select id="pfCategory"></select></div>
    <div class="form-group"><label>দাম (৳)</label><input type="number" id="pfPrice" step="0.01"></div>
    <div class="form-group"><label>ছাড় মূল্য (ঐচ্ছিক)</label><input type="number" id="pfCompare" step="0.01"></div>
    <div class="form-group"><label>স্টক</label><input type="number" id="pfStock" value="10"></div>
    <div class="form-group"><label>রং (কমা দিয়ে আলাদা করুন, যেমন: লাল, নীল, কালো)</label><input type="text" id="pfColors" placeholder="যেমন: লাল, নীল, কালো"></div>
    <div class="form-group">
      <label><input type="checkbox" id="pfFeatured"> ফিচার্ড</label>
    </div>
    <div class="form-group"><label>বিবরণ</label><textarea id="pfDesc" rows="4"></textarea></div>
    <div class="form-group"><label>ছবি আপলোড</label><input type="file" id="pfImageUpload" accept="image/*" onchange="uploadProductImage(this)"> <span id="uploadStatus" style="font-size:13px;color:var(--gray);margin-left:8px;"></span></div>
    <div class="form-group"><label>ছবির URL (JSON array)</label><textarea id="pfImages" rows="2">[]</textarea></div>
    <div id="pfPreview" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;"></div>
    <div style="display:flex;gap:12px;">
      <button class="btn btn-primary" onclick="saveProduct()">সংরক্ষণ</button>
      <button class="btn btn-outline" onclick="closeProductForm()">বাতিল</button>
    </div>
  </div>
</div>

<script src="../js/api.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>
