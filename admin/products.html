<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/uploads/ishop-logo.svg">
<title data-i18n="admin.title_products">পণ্য v2.0</title>
<link rel="stylesheet" href="../css/style.css?v=4.2">
<script>
(function(){try{var s=JSON.parse(localStorage.getItem('siteSettings'));if(!s)return;var r=document.documentElement;var p=[['header_bg','--header-bg'],['header_text_color','--header-text'],['body_bg','--body-bg'],['primary_color','--primary'],['footer_bg','--footer-bg'],['footer_text_color','--footer-text']];p.forEach(function(k){if(s[k[0]])r.style.setProperty(k[1],s[k[0]]);});var sn=s.site_name||'';document.addEventListener('DOMContentLoaded',function(){var el=document.getElementById('siteLogo')||document.querySelector('header .logo');if(el){var ad=el.querySelector('[data-i18n]');var adText=ad?' '+ad.textContent:'';if(s.logo_url){el.innerHTML='<img src="'+s.logo_url+'" alt="'+sn+'" style="height:48px;width:auto;" onerror="this.onerror=null;this.style.display=\'none\'">'+'<span class="site-name">'+sn+'</span>'+adText;}else{el.innerHTML=sn+'<span>'+adText+'</span>';}}document.querySelectorAll('.dz-footer-bottom p').forEach(function(f){f.textContent=f.textContent.replace(/\u0987\u09b6\u09aa/g,sn).replace(/iShop/g,sn);});var ti=document.querySelector('title');if(ti)ti.textContent=ti.textContent.replace(/\u0987\u09b6\u09aa/g,sn).replace(/iShop/g,sn);});}catch(e){}})();
</script>
<link rel="stylesheet" href="admin.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{opacity:0}</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/admin/" class="logo"><span data-i18n="admin.brand_admin">অ্যাডমিন</span></a>
    <nav><button class="lang-toggle" onclick="toggleLang()" id="langToggle">EN</button><a href="/" data-i18n="nav.gosite">সাইটে যান</a><a href="#" onclick="adminLogout()" data-i18n="nav.logout">লগআউট</a></nav>
  </div>
</header>

<div class="admin-layout">
    <div class="admin-sidebar">
      <a href="/admin/"><span class="sidebar-icon">📊</span> <span data-i18n="admin.dashboard">ড্যাশবোর্ড</span></a>
      <a href="/admin/product-new.html" class="sidebar-new"><span class="sidebar-icon">➕</span> <span data-i18n="admin.new_product">নতুন পণ্য</span></a>
      <a href="/admin/products.html" class="active"><span class="sidebar-icon">📦</span> <span data-i18n="admin.products">পণ্য</span></a>
      <a href="/admin/categories.html"><span class="sidebar-icon">🏷️</span> <span data-i18n="admin.categories">ক্যাটাগরি</span></a>
      <a href="/admin/questions.html"><span class="sidebar-icon">❓</span> <span data-i18n="admin.questions">প্রশ্ন ও উত্তর</span></a>
      <a href="/admin/users.html"><span class="sidebar-icon">👥</span> <span data-i18n="admin.customers_sidebar">গ্রাহক</span></a>
      <a href="/admin/admins.html"><span class="sidebar-icon">🛡️</span> <span data-i18n="admin.team_sidebar">অ্যাডমিন টিম</span></a>
      <a href="/admin/orders.html"><span class="sidebar-icon">🛒</span> <span data-i18n="admin.orders">অর্ডার</span></a>
<hr class="sidebar-divider">
      <a href="/admin/pages.html"><span class="sidebar-icon">📄</span> পেজ এডিটর</a>
      <a href="/admin/settings.html"><span class="sidebar-icon">⚙️</span> <span data-i18n="admin.settings">সেটিংস</span></a>
      <a href="/admin/profile.html"><span class="sidebar-icon">👤</span> <span data-i18n="nav.profile">প্রোফাইল</span></a>
    </div>
    <div class="admin-content">
      <div class="page-header">
        <h2 data-i18n="admin.products">পণ্য</h2>
        <div class="page-actions"><button class="btn btn-primary" onclick="window.location='/admin/product-new.html'" data-i18n="admin.new_product">+ নতুন পণ্য</button></div>
      </div>
      <div class="toolbar">
        <div id="productCountWrap"></div>
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="productSearchInput" placeholder="পণ্য খুঁজুন..." data-i18n-placeholder="admin.search_products" oninput="loadAdminProducts()" class="search-input" autocomplete="off">
        </div>
        <button onclick="downloadProductsExcel()" style="padding:10px 14px;border:1.5px solid #e4e4e7;border-radius:10px;font-size:14px;background:#fff;cursor:pointer;white-space:nowrap;" data-i18n="admin.download_excel">📥 Excel ডাউনলোড</button>
      </div>
    <div id="loginPrompt" class="login-prompt">
      <div class="login-box">
        <div class="login-icon">🔐</div>
        <h2 data-i18n="admin.login_title">Admin Login</h2>
        <p class="login-sub" data-i18n="admin.login_sub">Sign in to manage your store</p>
        <input type="text" id="adminEmail" data-i18n-placeholder="admin.login_email_ph" placeholder="admin@email.com" autocomplete="off">
        <input type="password" id="adminPass" data-i18n-placeholder="admin.login_pass_ph" placeholder="Password" autocomplete="off">
        <button onclick="adminLogin()" data-i18n="admin.login_btn">Sign In</button>
        <p class="login-footer" data-i18n="admin.login_footer">Admin Panel</p>
      </div>
    </div>
    <div id="productTableWrap"></div>
  </div>
</div>

<div id="productModal" style="display:none;" class="product-panel">
  <div class="panel-overlay" onclick="closeProductForm()"></div>
  <div class="panel-content">
    <div class="panel-header">
      <h3 id="modalTitle">নতুন পণ্য</h3>
      <button class="panel-close" onclick="closeProductForm()">&times;</button>
    </div>
    <div class="form-group"><label data-i18n="admin.name_bn">নাম (বাংলা)</label><input type="text" id="pfName"></div>
    <div class="form-group"><label data-i18n="admin.name_en">Name (English)</label><input type="text" id="pfEName"></div>
    <div class="form-group"><label data-i18n="admin.category">ক্যাটাগরি</label><select id="pfCategory"></select></div>
    <div class="form-group"><label data-i18n="admin.price">দাম (৳)</label><input type="number" id="pfPrice" step="0.01"></div>
    <div class="form-group"><label data-i18n="admin.purchase_price">ক্রয় মূল্য (৳)</label><input type="number" id="pfPurchasePrice" step="0.01" value="0"></div>
    <div class="form-group"><label data-i18n="admin.compare_price">ছাড় মূল্য (ঐচ্ছিক)</label><input type="number" id="pfCompare" step="0.01"></div>
    <div class="form-group"><label data-i18n="admin.stock">স্টক</label><input type="number" id="pfStock" value="10"></div>
    <div class="form-group"><label data-i18n="admin.colors">রং (কমা দিয়ে আলাদা করুন, যেমন: লাল, নীল, কালো)</label><input type="text" id="pfColors" data-i18n-placeholder="admin.colors_placeholder" placeholder="যেমন: লাল, নীল, কালো"></div>
    <div class="form-group">
      <label><input type="checkbox" id="pfFeatured"> <span data-i18n="admin.featured">ফিচার্ড</span></label>
    </div>
    <div class="form-group"><label data-i18n="admin.description">বিবরণ</label>
      <div class="desc-toolbar" id="descToolbar">
        <button type="button" onclick="descFormat('bold')" title="Bold"><b>B</b></button>
        <button type="button" onclick="descFormat('italic')" title="Italic"><i>I</i></button>
        <button type="button" onclick="descFormat('underline')" title="Underline"><u>U</u></button>
        <span class="tb-sep"></span>
        <button type="button" onclick="descFormat('h1')" title="Heading 1">H1</button>
        <button type="button" onclick="descFormat('h2')" title="Heading 2">H2</button>
        <button type="button" onclick="descFormat('h3')" title="Heading 3">H3</button>
        <span class="tb-sep"></span>
        <button type="button" onclick="descFormat('ul')" title="Bullet list">• UL</button>
        <button type="button" onclick="descFormat('ol')" title="Numbered list">1. OL</button>
        <span class="tb-sep"></span>
        <button type="button" onclick="descFormat('link')" title="Insert link">🔗</button>
        <button type="button" onclick="descFormat('image')" title="Insert image">🖼</button>
        <span class="tb-sep"></span>
        <button type="button" onclick="descFormat('left')" title="Align left">≡</button>
        <button type="button" onclick="descFormat('center')" title="Align center">≡</button>
        <span class="tb-sep"></span>
        <button type="button" onclick="toggleDescPreview()" id="descPreviewBtn" data-i18n="admin.preview">Preview</button>
      </div>
      <textarea id="pfDesc" rows="8" style="font-family:var(--font-bn);font-size:14px;width:100%;padding:10px;border:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);resize:vertical;" oninput="autoDescPreview()"></textarea>
      <div id="pfDescPreview" style="display:none;padding:16px;border:1px solid var(--border);border-top:0;border-radius:0 0 var(--radius) var(--radius);background:var(--white);line-height:1.8;font-size:15px;"></div>
    </div>
    <div class="form-group"><label data-i18n="admin.image_upload">ছবি আপলোড</label><input type="file" id="pfImageUpload" accept="image/*" onchange="uploadProductImage(this)"> <span id="uploadStatus" style="font-size:13px;color:var(--gray);margin-left:8px;"></span></div>
    <div class="form-group"><label data-i18n="admin.image_url">ছবির URL (JSON array)</label><textarea id="pfImages" rows="2">[]</textarea></div>
    <div id="pfPreview" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;"></div>
    <div id="pfColorImagesCard" style="display:none;margin-bottom:12px;padding:12px;border:1px solid var(--border);border-radius:var(--radius);">
      <div style="font-weight:600;font-size:14px;margin-bottom:6px;">🎨 রং অনুযায়ী ছবি</div>
      <p style="font-size:12px;color:#9ca3af;margin-bottom:8px;">প্রতিটি রংয়ের জন্য আলাদা ছবি আপলোড করুন।</p>
      <div id="pfColorImagesList"></div>
    </div>
    <div style="display:flex;gap:12px;">
      <button class="btn btn-primary" onclick="saveProduct()" data-i18n="admin.save">সংরক্ষণ</button>
      <button class="btn btn-outline" onclick="closeProductForm()" data-i18n="admin.cancel">বাতিল</button>
    </div>
  </div>
</div>
<script src="../js/i18n.js"></script>
<script src="../js/api.js"></script>
<script src="../js/admin.js"></script>
</body>
</html>
