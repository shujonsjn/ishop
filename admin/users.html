<script>
(function(){try{var s=JSON.parse(localStorage.getItem('siteSettings'));if(!s)return;var r=document.documentElement;var p=[['header_bg','--header-bg'],['header_text_color','--header-text'],['body_bg','--body-bg'],['primary_color','--primary'],['footer_bg','--footer-bg'],['footer_text_color','--footer-text']];p.forEach(function(k){if(s[k[0]])r.style.setProperty(k[1],s[k[0]]);});var sn=s.site_name||'';document.addEventListener('DOMContentLoaded',function(){var el=document.getElementById('siteLogo')||document.querySelector('header .logo');if(el){var ad=el.querySelector('[data-i18n]');var adText=ad?' '+ad.textContent:'';if(s.logo_url){el.innerHTML='<img src="'+s.logo_url+'" alt="'+sn+'" style="height:48px;width:auto;" onerror="this.onerror=null;this.style.display=\'none\'">'+'<span class="site-name">'+sn+'</span>'+adText;}else{el.innerHTML=sn+'<span>'+adText+'</span>';}}document.querySelectorAll('.dz-footer-bottom p').forEach(function(f){f.textContent=f.textContent.replace(/\u0987\u09b6\u09aa/g,sn).replace(/iShop/g,sn);});var ti=document.querySelector('title');if(ti)ti.textContent=ti.textContent.replace(/\u0987\u09b6\u09aa/g,sn).replace(/iShop/g,sn);});}catch(e){}})();
</script>
<link rel="stylesheet" href="admin.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>

<hr class="sidebar-divider">

<script src="../js/i18n.js"></script>
<script src="../js/api.js"></script>
<script src="../js/admin.js"></script>
<script>
function downloadUsersExcel() {
  apiAdmin('GET', '/users?role=user').then(function(users) {
    if (!users || users.length === 0) { toast('ডাউনলোড করার মতো ডাটা নেই', 'error'); return; }
    var lang = window.getLang ? getLang() : 'bn';
    var headers = ['ID', lang === 'en' ? 'Name' : 'নাম', 'Email', lang === 'en' ? 'Phone' : 'ফোন', lang === 'en' ? 'Address' : 'ঠিকানা', lang === 'en' ? 'Role' : 'রোল', lang === 'en' ? 'Joined' : 'যোগদান'];
    var rows = [headers.join(',')];
    users.forEach(function(u) {
      var row = [
        u.id,
        '"' + (u.name || '').replace(/"/g, '""') + '"',
        '"' + (u.email || '').replace(/"/g, '""') + '"',
        '"' + (u.phone || '').replace(/"/g, '""') + '"',
        '"' + (u.address || '').replace(/"/g, '""') + '"',
        '"' + (u.role || '').replace(/"/g, '""') + '"',
        '"' + (u.created_at || '').replace(/"/g, '""') + '"'
      ];
      rows.push(row.join(','));
    });
    var csv = '\uFEFF' + rows.join('\n');
    var blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'customers_' + new Date().toISOString().slice(0,10) + '.csv';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('Excel ডাউনলোড হয়েছে!');
  });
}

function toggleUserRole(id, currentRole) {
  var newRole = currentRole === 'admin' ? 'user' : 'admin';
  var label = newRole === 'admin' ? __('confirm.make_admin') : __('confirm.make_user');
  if (!confirm(label)) return;
  apiAdmin('PUT', '/users/' + id + '/role', { role: newRole }).then(function(res) {
    if (res.error) { toast(res.error, 'error'); return; }
    toast(__('toast.role_updated'));
    loadAdminUsers();
  });
}

function deleteUser(id) {
  if (!confirm(__('confirm.delete_user'))) return;
  apiAdmin('DELETE', '/users/' + id).then(function(res) {
    if (res.error) { toast(res.error, 'error'); return; }
    toast(__('toast.user_deleted'));
    loadAdminUsers();
  });
}
</script>
