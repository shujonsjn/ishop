<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/uploads/ishop-logo.svg">
<title data-i18n="profile.title">প্রোফাইল v2.0</title>
<link rel="stylesheet" href="../css/style.css?v=3.2">
<script>
(function(){try{var s=JSON.parse(localStorage.getItem('siteSettings'));if(!s)return;var r=document.documentElement;var p=[['header_bg','--header-bg'],['header_text_color','--header-text'],['body_bg','--body-bg'],['primary_color','--primary'],['footer_bg','--footer-bg'],['footer_text_color','--footer-text']];p.forEach(function(k){if(s[k[0]])r.style.setProperty(k[1],s[k[0]]);});var sn=s.site_name||'';document.addEventListener('DOMContentLoaded',function(){var el=document.getElementById('siteLogo')||document.querySelector('header .logo');if(el){var ad=el.querySelector('[data-i18n]');var adText=ad?' '+ad.textContent:'';if(s.logo_url){el.innerHTML='<img src="'+s.logo_url+'" alt="'+sn+'" style="height:48px;width:auto;" onerror="this.onerror=null;this.style.display=\'none\'">'+'<span class="site-name">'+sn+'</span>'+adText;}else{el.innerHTML=sn+'<span>'+adText+'</span>';}}document.querySelectorAll('.dz-footer-bottom p').forEach(function(f){f.textContent=f.textContent.replace(/\u0987\u09b6\u09aa/g,sn).replace(/iShop/g,sn);});var ti=document.querySelector('title');if(ti)ti.textContent=ti.textContent.replace(/\u0987\u09b6\u09aa/g,sn).replace(/iShop/g,sn);});}catch(e){}})();
</script>
<link rel="stylesheet" href="admin.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/admin/" class="logo"><span data-i18n="admin.brand_admin">অ্যাডমিন</span></a>
    <nav><button class="lang-toggle" onclick="toggleLang()" id="langToggle">EN</button><a href="/" data-i18n="nav.gosite">সাইটে যান</a><a href="#" onclick="adminLogout()" data-i18n="nav.logout">লগআউট</a></nav>
  </div>
</header>

<div class="admin-layout">
    <div class="admin-sidebar">
      <a href="/admin/"><span class="sidebar-icon">📊</span> <span data-i18n="admin.dashboard">ড্যাশবোর্ড</span></a>
      <a href="/admin/product-new.html" class="sidebar-new"><span class="sidebar-icon">➕</span> <span data-i18n="admin.new_product">নতুন পণ্য</span></a>
      <a href="/admin/products.html"><span class="sidebar-icon">📦</span> <span data-i18n="admin.products">পণ্য</span></a>
      <a href="/admin/categories.html"><span class="sidebar-icon">🏷️</span> <span data-i18n="admin.categories">ক্যাটাগরি</span></a>
      <a href="/admin/questions.html"><span class="sidebar-icon">❓</span> <span data-i18n="admin.questions">প্রশ্ন ও উত্তর</span></a>
      <a href="/admin/users.html"><span class="sidebar-icon">👥</span> <span data-i18n="admin.customers_sidebar">গ্রাহক</span></a>
      <a href="/admin/admins.html"><span class="sidebar-icon">🛡️</span> <span data-i18n="admin.team_sidebar">অ্যাডমিন টিম</span></a>
      <a href="/admin/orders.html"><span class="sidebar-icon">🛒</span> <span data-i18n="admin.orders">অর্ডার</span></a>
<hr class="sidebar-divider">
      <a href="/admin/pages.html"><span class="sidebar-icon">📄</span> পেজ এডিটর</a>
      <a href="/admin/settings.html"><span class="sidebar-icon">⚙️</span> <span data-i18n="admin.settings">সেটিংস</span></a>
      <a href="/admin/profile.html" class="active"><span class="sidebar-icon">👤</span> <span data-i18n="nav.profile">প্রোফাইল</span></a>
    </div>
  <div class="admin-content">
    <div class="page-header"><h2 data-i18n="profile.heading">আমার প্রোফাইল</h2></div>
    <div id="loginPrompt" class="login-prompt">
      <div class="login-box">
        <div class="login-icon">🔐</div>
        <h2 data-i18n="admin.login_title">Admin Login</h2>
        <p class="login-sub" data-i18n="admin.login_sub">Sign in to manage your profile</p>
        <input type="text" id="adminEmail" data-i18n-placeholder="admin.login_email_ph" placeholder="admin@email.com">
        <input type="password" id="adminPass" data-i18n-placeholder="admin.login_pass_ph" placeholder="Password">
        <button onclick="adminLogin()" data-i18n="admin.login_btn">Sign In</button>
        <p class="login-footer" data-i18n="admin.login_footer">Admin Panel</p>
      </div>
    </div>

    <div class="settings-layout" id="profileApp" style="display:none;">
      <div class="settings-sidebar">
        <button class="settings-tab active" data-tab="info" onclick="switchProfileTab('info')">
          <span class="settings-tab-icon">👤</span>
          <span data-i18n="profile.heading">প্রোফাইল</span>
        </button>
        <button class="settings-tab" data-tab="password" onclick="switchProfileTab('password')">
          <span class="settings-tab-icon">🔒</span>
          <span data-i18n="profile.change_password">পাসওয়ার্ড</span>
        </button>
      </div>
      <div class="settings-content">

        <div class="settings-panel active" id="profileTab_info">
          <h3 class="settings-panel-title" data-i18n="profile.heading">👤 প্রোফাইল তথ্য</h3>
          <div class="settings-card">
            <div style="text-align:center;margin-bottom:20px;">
              <img id="profileAvatar" src="" style="width:100px;height:100px;border-radius:50%;object-fit:cover;border:3px solid var(--border);display:none;">
              <div style="margin-top:8px;">
                <label class="btn btn-outline" for="avatarUpload" style="cursor:pointer;font-size:13px;" data-i18n="profile.upload_photo">ছবি আপলোড</label>
                <input type="file" id="avatarUpload" accept="image/*" style="display:none" onchange="uploadAvatar(this)">
              </div>
            </div>
            <div class="form-group"><label data-i18n="profile.name">নাম</label><input type="text" id="profileName"></div>
            <div class="form-group"><label data-i18n="profile.email">ইমেইল</label><input type="email" id="profileEmail" readonly style="background:#f3f4f6;cursor:not-allowed;"></div>
            <div class="form-group"><label data-i18n="profile.phone">ফোন</label><input type="text" id="profilePhone"></div>
            <div class="form-group"><label data-i18n="profile.address">ঠিকানা</label><textarea id="profileAddress" rows="2"></textarea></div>
            <button class="btn btn-primary" onclick="updateProfile()" data-i18n="profile.update">আপডেট করুন</button>
          </div>
        </div>

        <div class="settings-panel" id="profileTab_password">
          <h3 class="settings-panel-title">🔒 <span data-i18n="profile.change_password">পাসওয়ার্ড পরিবর্তন</span></h3>
          <div class="settings-card">
            <div class="form-group"><label data-i18n="profile.current_password">বর্তমান পাসওয়ার্ড</label><input type="password" id="profileCurPass"></div>
            <div class="form-group"><label data-i18n="profile.new_password">নতুন পাসওয়ার্ড</label><input type="password" id="profileNewPass"></div>
            <div class="form-group"><label data-i18n="profile.confirm_password">নতুন পাসওয়ার্ড নিশ্চিত করুন</label><input type="password" id="profileConfirmPass"></div>
            <button class="btn btn-primary" onclick="changePassword()" data-i18n="profile.change_btn">পাসওয়ার্ড পরিবর্তন</button>
          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script src="../js/i18n.js"></script>
<script src="../js/api.js"></script>
<script src="../js/admin.js"></script>
<script>
var token = localStorage.getItem('adminToken');
if (!token) { document.getElementById('loginPrompt').style.display = 'block'; }
else { document.getElementById('profileApp').style.display = 'flex'; }

window.switchProfileTab = function(tab) {
  document.querySelectorAll('#profileApp .settings-tab').forEach(function(t) { t.classList.remove('active'); });
  document.querySelectorAll('#profileApp .settings-panel').forEach(function(p) { p.classList.remove('active'); });
  var btn = document.querySelector('#profileApp .settings-tab[data-tab="' + tab + '"]');
  var panel = document.getElementById('profileTab_' + tab);
  if (btn) btn.classList.add('active');
  if (panel) panel.classList.add('active');
};

window.uploadAvatar = function(input) {
  if (!input.files || !input.files[0]) return;
  var fd = new FormData();
  fd.append('avatar', input.files[0]);
  apiForm('POST', '/users/me/avatar', fd).then(function(data) {
    if (data.error) { toast(data.error, 'error'); return; }
    var img = document.getElementById('profileAvatar');
    img.src = data.avatar + '?t=' + Date.now();
    img.style.display = 'inline-block';
    toast(__('toast.photo_updated'));
  });
};
window.changePassword = function() {
  var cur = document.getElementById('profileCurPass').value;
  var neu = document.getElementById('profileNewPass').value;
  var confirm = document.getElementById('profileConfirmPass').value;
  if (!cur || !neu || !confirm) { toast(__('toast.enter_passwords'), 'error'); return; }
  if (neu.length < 4) { toast(__('toast.password_short'), 'error'); return; }
  if (neu !== confirm) { toast('নতুন পাসওয়ার্ড মিলছে না!', 'error'); return; }
  api('PUT', '/users/me/password', { current_password: cur, new_password: neu }).then(function(data) {
    if (data.error) { toast(data.error, 'error'); return; }
    toast(__('toast.password_changed'));
    document.getElementById('profileCurPass').value = '';
    document.getElementById('profileNewPass').value = '';
    document.getElementById('profileConfirmPass').value = '';
  });
};
</script>
</body>
</html>
