<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-i18n="profile.title">প্রোফাইল — ইশপ</title>
<link rel="stylesheet" href="../css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
.admin-layout { display: grid; grid-template-columns: 220px 1fr; min-height: calc(100vh - 60px); }
.admin-sidebar { background: var(--dark); padding: 20px; }
.admin-sidebar a { display: block; color: #d1d5db; padding: 10px; border-radius: 6px; margin-bottom: 4px; }
.admin-sidebar a:hover, .admin-sidebar a.active { background: rgba(255,255,255,0.1); color: var(--white); }
.admin-content { padding: 24px; display:flex; flex-direction:column; align-items:center; }
.profile-card { max-width: 500px; width:100%; background: var(--white); border-radius: var(--radius); padding: 24px; box-shadow: var(--shadow); }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/admin/" class="logo">ইশপ <span data-i18n="admin.brand_admin">অ্যাডমিন</span></a>
    <nav><button class="lang-toggle" onclick="toggleLang()" id="langToggle">EN</button><a href="/" data-i18n="nav.gosite">সাইটে যান</a><a href="#" onclick="adminLogout()" data-i18n="nav.logout">লগআউট</a></nav>
  </div>
</header>

<div class="admin-layout">
  <div class="admin-sidebar">
    <a href="/admin/" data-i18n="admin.dashboard">ড্যাশবোর্ড</a>
    <a href="/admin/product-new.html" data-i18n="admin.new_product" style="background:var(--primary);color:var(--white);border-radius:6px;font-weight:600;margin-bottom:8px;">+ নতন পণ্য</a>
    <a href="/admin/products.html" data-i18n="admin.products">পণ্য</a>
    <a href="/admin/categories.html" data-i18n="admin.categories">ক্যাটাগরি</a>
    <a href="/admin/users.html" data-i18n="admin.users">ব্যবহারকারী</a>
    <a href="/admin/orders.html" data-i18n="admin.orders">অর্ডার</a>
    <a href="/admin/profile.html" style="margin-top:20px;" data-i18n="nav.profile">প্রোফাইল</a>
  </div>
  <div class="admin-content">
    <h2 style="margin-bottom:20px;text-align:center;width:100%;" data-i18n="profile.heading">আমার প্রোফাইল</h2>
    <div class="profile-card" style="margin-bottom:24px;">
      <div style="text-align:center;margin-bottom:16px;">
        <img id="profileAvatar" src="" style="width:100px;height:100px;border-radius:50%;object-fit:cover;border:3px solid var(--border);display:none;">
        <div style="margin-top:8px;">
          <label class="btn btn-outline" for="avatarUpload" style="cursor:pointer;font-size:13px;" data-i18n="profile.upload_photo">ছবি আপলোড</label>
          <input type="file" id="avatarUpload" accept="image/*" style="display:none" onchange="uploadAvatar(this)">
        </div>
      </div>
      <div class="form-group"><label data-i18n="profile.name">নাম</label><input type="text" id="profileName"></div>
      <div class="form-group"><label data-i18n="profile.email">ইমেইল</label><input type="email" id="profileEmail" readonly style="background:#f3f4f6;cursor:not-allowed;"></div>
      <div class="form-group"><label data-i18n="profile.phone">ফোন</label><input type="text" id="profilePhone"></div>
      <div class="form-group"><label data-i18n="profile.address">ঠিকানা</label><textarea id="profileAddress" rows="2"></textarea></div>
      <button class="btn btn-primary" onclick="updateProfile()" data-i18n="profile.update">আপডেট করুন</button>
    </div>
    <div class="profile-card">
      <h3 style="margin-bottom:12px;" data-i18n="profile.change_password">পাসওয়ার্ড পরিবর্তন</h3>
      <div class="form-group"><label data-i18n="profile.current_password">বর্তমান পাসওয়ার্ড</label><input type="password" id="profileCurPass"></div>
      <div class="form-group"><label data-i18n="profile.new_password">নতুন পাসওয়ার্ড</label><input type="password" id="profileNewPass"></div>
      <button class="btn btn-primary" onclick="changePassword()" data-i18n="profile.change_btn">পাসওয়ার্ড পরিবর্তন</button>
    </div>
  </div>
</div>

<div id="productModal" style="display:none;" class="product-panel">
  <div class="panel-overlay" onclick="closeProductForm()"></div>
  <div class="panel-content">
    <div class="panel-header">
      <h3 id="modalTitle">নতুন পণ্য</h3>
      <button class="panel-close" onclick="closeProductForm()">&times;</button>
    </div>
    <div class="form-group"><label data-i18n="admin.name_bn">নাম (বাংলা)</label><input type="text" id="pfName"></div>
    <div class="form-group"><label data-i18n="admin.name_en">Name (English)</label><input type="text" id="pfEName"></div>
    <div class="form-group"><label data-i18n="admin.category">ক্যাটাগরি</label><select id="pfCategory"></select></div>
    <div class="form-group"><label data-i18n="admin.price">দাম (৳)</label><input type="number" id="pfPrice" step="0.01"></div>
    <div class="form-group"><label data-i18n="admin.compare_price">ছাড় মূল্য (ঐচ্ছিক)</label><input type="number" id="pfCompare" step="0.01"></div>
    <div class="form-group"><label data-i18n="admin.stock">স্টক</label><input type="number" id="pfStock" value="10"></div>
    <div class="form-group"><label data-i18n="admin.colors">রং (কমা দিয়ে আলাদা করুন, যেমন: লাল, নীল, কালো)</label><input type="text" id="pfColors" data-i18n-placeholder="admin.colors_placeholder" placeholder="যেমন: লাল, নীল, কালো"></div>
    <div class="form-group">
      <label><input type="checkbox" id="pfFeatured"> <span data-i18n="admin.featured">ফিচার্ড</span></label>
    </div>
    <div class="form-group"><label data-i18n="admin.description">বিবরণ</label>
      <div class="desc-toolbar" id="descToolbar">
        <button type="button" onclick="descFormat('bold')" title="Bold"><b>B</b></button>
        <button type="button" onclick="descFormat('italic')" title="Italic"><i>I</i></button>
        <button type="button" onclick="descFormat('underline')" title="Underline"><u>U</u></button>
        <span class="tb-sep"></span>
        <button type="button" onclick="descFormat('h1')" title="Heading 1">H1</button>
        <button type="button" onclick="descFormat('h2')" title="Heading 2">H2</button>
        <button type="button" onclick="descFormat('h3')" title="Heading 3">H3</button>
        <span class="tb-sep"></span>
        <button type="button" onclick="descFormat('ul')" title="Bullet list">• UL</button>
        <button type="button" onclick="descFormat('ol')" title="Numbered list">1. OL</button>
        <span class="tb-sep"></span>
        <button type="button" onclick="descFormat('link')" title="Insert link">🔗</button>
        <button type="button" onclick="descFormat('image')" title="Insert image">🖼</button>
        <span class="tb-sep"></span>
        <button type="button" onclick="descFormat('left')" title="Align left">≡</button>
        <button type="button" onclick="descFormat('center')" title="Align center">≡</button>
        <span class="tb-sep"></span>
        <button type="button" onclick="toggleDescPreview()" id="descPreviewBtn" data-i18n="admin.preview">Preview</button>
      </div>
      <textarea id="pfDesc" rows="8" style="font-family:var(--font-bn);font-size:14px;width:100%;padding:10px;border:1px solid var(--border);border-radius:0 0 var(--radius) var(--radius);resize:vertical;" oninput="autoDescPreview()"></textarea>
      <div id="pfDescPreview" style="display:none;padding:16px;border:1px solid var(--border);border-top:0;border-radius:0 0 var(--radius) var(--radius);background:var(--white);line-height:1.8;font-size:15px;"></div>
    </div>
    <div class="form-group"><label data-i18n="admin.image_upload">ছবি আপলোড</label><input type="file" id="pfImageUpload" accept="image/*" onchange="uploadProductImage(this)"> <span id="uploadStatus" style="font-size:13px;color:var(--gray);margin-left:8px;"></span></div>
    <div class="form-group"><label data-i18n="admin.image_url">ছবির URL (JSON array)</label><textarea id="pfImages" rows="2">[]</textarea></div>
    <div id="pfPreview" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;"></div>
    <div style="display:flex;gap:12px;">
      <button class="btn btn-primary" onclick="saveProduct()" data-i18n="admin.save">সংরক্ষণ</button>
      <button class="btn btn-outline" onclick="closeProductForm()" data-i18n="admin.cancel">বাতিল</button>
    </div>
  </div>
</div>

<script src="../js/i18n.js"></script>
<script src="../js/api.js"></script>
<script src="../js/admin.js"></script>
<script>
window.uploadAvatar = function(input) {
  if (!input.files || !input.files[0]) return;
  var fd = new FormData();
  fd.append('avatar', input.files[0]);
  apiForm('POST', '/users/me/avatar', fd).then(function(data) {
    if (data.error) { toast(data.error, 'error'); return; }
    var img = document.getElementById('profileAvatar');
    img.src = data.avatar + '?t=' + Date.now();
    img.style.display = 'inline-block';
    toast(__('toast.photo_updated'));
  });
};
window.changePassword = function() {
  var cur = document.getElementById('profileCurPass').value;
  var neu = document.getElementById('profileNewPass').value;
  if (!cur || !neu) { toast(__('toast.enter_passwords'), 'error'); return; }
  if (neu.length < 4) { toast(__('toast.password_short'), 'error'); return; }
  api('PUT', '/users/me/password', { current_password: cur, new_password: neu }).then(function(data) {
    if (data.error) { toast(data.error, 'error'); return; }
    toast(__('toast.password_changed'));
    document.getElementById('profileCurPass').value = '';
    document.getElementById('profileNewPass').value = '';
  });
};
</script>
</body>
</html>
