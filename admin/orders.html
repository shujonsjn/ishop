<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/uploads/ishop-logo.svg">
<title data-i18n="admin.title_orders">অর্ডার v2.0</title>
<link rel="stylesheet" href="../css/style.css?v=4.2">
<script>
(function(){try{var s=JSON.parse(localStorage.getItem('siteSettings'));if(!s)return;var r=document.documentElement;var p=[['header_bg','--header-bg'],['header_text_color','--header-text'],['body_bg','--body-bg'],['primary_color','--primary'],['footer_bg','--footer-bg'],['footer_text_color','--footer-text']];p.forEach(function(k){if(s[k[0]])r.style.setProperty(k[1],s[k[0]]);});var sn=s.site_name||'';document.addEventListener('DOMContentLoaded',function(){var el=document.getElementById('siteLogo')||document.querySelector('header .logo');if(el){var ad=el.querySelector('[data-i18n]');var adText=ad?' '+ad.textContent:'';if(s.logo_url){el.innerHTML='<img src="'+s.logo_url+'" alt="'+sn+'" style="height:48px;width:auto;" onerror="this.onerror=null;this.style.display=\'none\'">'+'<span class="site-name">'+sn+'</span>'+adText;}else{el.innerHTML=sn+'<span>'+adText+'</span>';}}document.querySelectorAll('.dz-footer-bottom p').forEach(function(f){f.textContent=f.textContent.replace(/\u0987\u09b6\u09aa/g,sn).replace(/iShop/g,sn);});var ti=document.querySelector('title');if(ti)ti.textContent=ti.textContent.replace(/\u0987\u09b6\u09aa/g,sn).replace(/iShop/g,sn);});}catch(e){}})();
</script>
<link rel="stylesheet" href="admin.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>body{opacity:0}</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/admin/" class="logo"><span data-i18n="admin.brand_admin">অ্যাডমিন</span></a>
    <nav><button class="lang-toggle" onclick="toggleLang()" id="langToggle">EN</button><a href="/" data-i18n="nav.gosite">সাইটে যান</a><a href="#" onclick="adminLogout()" data-i18n="nav.logout">লগআউট</a></nav>
  </div>
</header>

<div class="admin-layout">
    <div class="admin-sidebar">
      <div class="sidebar-brand">🛡️ Admin Panel</div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">Main</div>
        <a href="/admin/" data-nav="dashboard"><span class="sidebar-icon">📊</span> <span data-i18n="admin.dashboard">ড্যাশবোর্ড</span></a>
        <a href="/admin/product-new.html" class="sidebar-new" data-nav="new"><span class="sidebar-icon">➕</span> <span data-i18n="admin.new_product">নতুন পণ্য</span></a>
        <a href="/admin/products.html" data-nav="products"><span class="sidebar-icon">📦</span> <span data-i18n="admin.products">পণ্য</span></a>
        <a href="/admin/categories.html" data-nav="categories"><span class="sidebar-icon">🏷️</span> <span data-i18n="admin.categories">ক্যাটাগরি</span></a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">Manage</div>
        <a href="/admin/orders.html" data-nav="orders" class="active"><span class="sidebar-icon">🛒</span> <span data-i18n="admin.orders">অর্ডার</span></a>
        <a href="/admin/users.html" data-nav="users"><span class="sidebar-icon">👥</span> <span data-i18n="admin.customers_sidebar">গ্রাহক</span></a>
        <a href="/admin/admins.html" data-nav="admins"><span class="sidebar-icon">🛡️</span> <span data-i18n="admin.team_sidebar">অ্যাডমিন টিম</span></a>
        <a href="/admin/questions.html" data-nav="questions"><span class="sidebar-icon">❓</span> <span data-i18n="admin.questions">প্রশ্ন ও উত্তর</span></a>
      </div>
      <div class="sidebar-section">
        <div class="sidebar-section-title">Content</div>
        <a href="/admin/pages.html" data-nav="pages"><span class="sidebar-icon">📄</span> পেজ এডিটর</a>
        <a href="/admin/settings.html" data-nav="settings"><span class="sidebar-icon">⚙️</span> <span data-i18n="admin.settings">সেটিংস</span></a>
        <a href="/admin/profile.html" data-nav="profile"><span class="sidebar-icon">👤</span> <span data-i18n="nav.profile">প্রোফাইল</span></a>
      </div>
    </div>
    <div class="admin-content">
      <div class="page-header"><h2 data-i18n="admin.orders">অর্ডার</h2></div>
    <div id="loginPrompt" class="login-prompt">
      <div class="login-box">
        <div class="login-icon">🔐</div>
        <h2 data-i18n="admin.login_title">Admin Login</h2>
        <p class="login-sub" data-i18n="admin.login_sub">Sign in to manage orders</p>
        <input type="text" id="adminEmail" data-i18n-placeholder="admin.login_email_ph" placeholder="admin@email.com">
        <input type="password" id="adminPass" data-i18n-placeholder="admin.login_pass_ph" placeholder="Password">
        <button onclick="adminLogin()" data-i18n="admin.login_btn">Sign In</button>
        <p class="login-footer" data-i18n="admin.login_footer">Admin Panel</p>
      </div>
    </div>
    <div class="toolbar">
      <div id="orderCountWrap"></div>
      <input type="date" id="orderDateFrom" style="padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;" data-i18n-title="admin.date_from">
      <input type="date" id="orderDateTo" style="padding:8px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:13px;" data-i18n-title="admin.date_to">
      <button onclick="loadAdminOrders()" style="padding:8px 14px;border-radius:8px;font-size:13px;background:#4f46e5;color:#fff;border:none;cursor:pointer;" data-i18n="admin.filter">ফিল্টার</button>
      <button onclick="resetOrderDateFilter()" style="padding:8px 14px;border-radius:8px;font-size:13px;background:#fff;border:1px solid #d1d5db;cursor:pointer;" data-i18n="admin.reset">রিসেট</button>
      <select id="statusFilter" onchange="loadAdminOrders()" class="filter-select">
        <option value="" data-i18n="admin.filter_all">সব অর্ডার</option>
        <option value="pending" data-i18n="orders.status_pending">পেন্ডিং</option>
        <option value="paid" data-i18n="orders.status_paid">পেইড</option>
        <option value="processing" data-i18n="orders.status_processing">প্রসেসিং</option>
        <option value="shipped" data-i18n="orders.status_shipped">শিপড</option>
        <option value="delivered" data-i18n="orders.status_delivered">ডেলিভারড</option>
        <option value="cancelled" data-i18n="orders.status_cancelled">বাতিল</option>
        <option value="cancel_requested" data-i18n="orders.status_cancel_requested">বাতিল অনুরোধ</option>
      </select>
      <select id="paymentFilter" onchange="loadAdminOrders()" class="filter-select">
        <option value="" data-i18n="admin.all_payments">সব পেমেন্ট</option>
        <option value="cod">COD</option>
        <option value="bkash">bKash</option>
        <option value="nagad">Nagad</option>
        <option value="rocket">Rocket</option>
        <option value="ucash">UCash</option>
        <option value="visa">Visa/Mastercard</option>
        <option value="sslcommerz">SSLCommerz</option>
      </select>
      <button onclick="downloadOrdersExcel()" style="padding:10px 14px;border:1.5px solid #e4e4e7;border-radius:10px;font-size:14px;background:#fff;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;" data-i18n="admin.download_excel">📥 Excel ডাউনলোড</button>
    </div>
    <div id="ordersTableWrap"></div>
  </div>
</div>

<div id="orderMemoModal" style="display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.5);" onclick="if(event.target===this)closeMemo()">
  <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);max-width:600px;width:90%;max-height:90vh;overflow-y:auto;background:#fff;border-radius:16px;padding:32px;box-shadow:0 20px 60px rgba(0,0,0,0.15);" id="memoContent">
  </div>
</div>

<script src="../js/i18n.js"></script>
<script src="../js/api.js"></script>
<script src="../js/admin.js"></script>
<script>
  setInterval(function() {
    if (typeof loadAdminOrders === 'function') loadAdminOrders();
  }, 10000);
</script>
</body>
</html>
