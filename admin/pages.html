(function(){try{var s=JSON.parse(localStorage.getItem('siteSettings'));if(!s)return;var r=document.documentElement;var p=[['header_bg','--header-bg'],['header_text_color','--header-text'],['body_bg','--body-bg'],['primary_color','--primary'],['footer_bg','--footer-bg'],['footer_text_color','--footer-text']];p.forEach(function(k){if(s[k[0]])r.style.setProperty(k[1],s[k[0]]);});var sn=s.site_name||'';document.addEventListener('DOMContentLoaded',function(){var el=document.getElementById('siteLogo')||document.querySelector('header .logo');if(el){var ad=el.querySelector('[data-i18n]');var adText=ad?' '+ad.textContent:'';if(s.logo_url){el.innerHTML='<img src="'+s.logo_url+'" alt="'+sn+'" style="height:48px;width:auto;" onerror="this.onerror=null;this.style.display=\'none\'">'+'<span class="site-name">'+sn+'</span>'+adText;}else{el.innerHTML=sn+'<span>'+adText+'</span>';}}document.querySelectorAll('.dz-footer-bottom p').forEach(function(f){f.textContent=f.textContent.replace(/\u0987\u09b6\u09aa/g,sn).replace(/iShop/g,sn);});var ti=document.querySelector('title');if(ti)ti.textContent=ti.textContent.replace(/\u0987\u09b6\u09aa/g,sn).replace(/iShop/g,sn);});}catch(e){}})();

.pages-sidebar button.active { background: var(--primary); color: #fff; font-weight: 600; }
.pages-editor { flex: 1; }
.section-editor { background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.section-editor .sec-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.section-editor .sec-header h3 { font-size: 16px; font-weight: 600; margin: 0; }

.section-editor input:focus, .section-editor textarea:focus { border-color: var(--primary); outline: none; }
.btn-add { padding: 10px 20px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 8px; }
.btn-remove { padding: 4px 10px; background: #fee2e2; color: #dc2626; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; }

.btn-save:hover { background: var(--primary-dark); }

<script>
var token = localStorage.getItem('adminToken');
if (!token) { document.getElementById('loginPrompt').style.display = 'block'; }
else {
  document.getElementById('pagesApp').style.display = 'block';
  fetch('/api/admin/settings', { headers: { Authorization: 'Bearer ' + token } })
  .then(function(r){ if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(function(){ loadPages(); })
  .catch(function(){
    document.getElementById('pagesApp').style.display = 'none';
    document.getElementById('loginPrompt').style.display = 'block';
    localStorage.removeItem('adminToken');
    token = null;
  });
}

function adminLogin() {
  var e = document.getElementById('adminEmail').value;
  var p = document.getElementById('adminPass').value;
  fetch('/api/users/login', { method: 'POST', headers: {'Content-Type':'application/x-www-form-urlencoded'}, body: 'email='+encodeURIComponent(e)+'&password='+encodeURIComponent(p) })
  .then(function(r){return r.json()}).then(function(d){
    if (d.token && d.user && d.user.role === 'admin') {
      localStorage.setItem('adminToken', d.token);
      token = d.token;
      document.getElementById('loginPrompt').style.display = 'none';
      document.getElementById('pagesApp').style.display = 'block';
      loadPages();
    } else { alert('Invalid credentials'); }
  });
}

function adminLogout() { localStorage.removeItem('adminToken'); window.location = '/admin/'; }

var allData = {};
var currentPage = 'page_home';

function loadPages() {
  fetch('/api/admin/settings', { headers: { Authorization: 'Bearer ' + token } })
  .then(function(r){return r.json()}).then(function(s){
    pageDefs.forEach(function(p){
      try { allData[p.key] = JSON.parse(s[p.key] || '{}'); } catch(e){ allData[p.key] = {}; }
    });
    renderSidebar();
    renderEditor(currentPage);
  });
}

function renderSidebar() {
  var el = document.getElementById('pagesSidebar');
  var lang = localStorage.getItem('lang') || 'bn';
  el.innerHTML = pageDefs.map(function(p){
    var label = lang === 'en' ? p.en : p.bn;
    return '<button onclick="switchPage(\'' + p.key + '\')" class="' + (p.key === currentPage ? 'active' : '') + '">' + p.icon + ' ' + label + '</button>';
  }).join('');
}

function switchPage(key) {
  currentPage = key;
  renderSidebar();
  renderEditor(key);
}

    html += '<label style="margin-top:8px;">ব্রেডক্রাম্ব — পণ্য (বাংলা)</label><input type="text" id="prodBreadProducts" value="' + esc(data.breadProducts || '') + '">';
    html += '<label style="margin-top:8px;">ব্রেডক্রাম্ব — পণ্য (English)</label><input type="text" id="prodBreadProductsEn" value="' + esc(data.breadProductsEn || '') + '">';
    html += '</div>';
  }
  else if (def.type === 'sections' || def.type === 'steps') {
    html += '<div class="section-editor"><label>পেজ শিরোনাম</label><input type="text" id="pgTitle" value="' + esc(data.title || '') + '"></div>';
    var items = data.sections || [];
    items.forEach(function(sec, i){
      html += '<div class="section-editor"><div class="sec-header"><h3>সেকশন ' + (i+1) + '</h3><button class="btn-remove" onclick="removeSection(' + i + ')">✕ সরান</button></div>';
      html += '<label>শিরোনাম</label><input type="text" id="secTitle_' + i + '" value="' + esc(sec.title || '') + '">';
      html += '<label style="margin-top:8px;">বিবরণ</label><textarea id="secContent_' + i + '" rows="4">' + esc(sec.content || '') + '</textarea></div>';
    });
    html += '<button class="btn-add" onclick="addSection()">+ নতুন সেকশন</button>';
  }
  else if (def.type === 'blog') {
    html += '<div class="section-editor"><label>পেজ শিরোনাম</label><input type="text" id="pgTitle" value="ব্লগ"></div>';
    var posts = data.posts || [];
    posts.forEach(function(post, i){
      html += '<div class="section-editor"><div class="sec-header"><h3>পোস্ট ' + (i+1) + '</h3><button class="btn-remove" onclick="removePost(' + i + ')">✕ সরান</button></div>';
      html += '<label>শিরোনাম</label><input type="text" id="postTitle_' + i + '" value="' + esc(post.title || '') + '">';
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px;"><div><label>তারিখ</label><input type="text" id="postDate_' + i + '" value="' + esc(post.date || '') + '"></div><div><label>ট্যাগ</label><input type="text" id="postTag_' + i + '" value="' + esc(post.tag || '') + '"></div></div>';
      html += '<label style="margin-top:8px;">বিবরণ</label><textarea id="postDesc_' + i + '" rows="3">' + esc(post.desc || '') + '</textarea></div>';
    });
    html += '<button class="btn-add" onclick="addPost()">+ নতুন পোস্ট</button>';
  }
  else if (def.type === 'faq') {
    html += '<div class="section-editor"><label>পেজ শিরোনাম</label><input type="text" id="pgTitle" value="' + esc(data.title || '') + '"></div>';
    var faqs = data.faqs || [];
    faqs.forEach(function(faq, i){
      html += '<div class="section-editor"><div class="sec-header"><h3>FAQ ' + (i+1) + '</h3><button class="btn-remove" onclick="removeFaq(' + i + ')">✕ সরান</button></div>';
      html += '<label>প্রশ্ন</label><input type="text" id="faqQ_' + i + '" value="' + esc(faq.q || '') + '">';
      html += '<label style="margin-top:8px;">উত্তর</label><textarea id="faqA_' + i + '" rows="3">' + esc(faq.a || '') + '</textarea></div>';
    });
    html += '<button class="btn-add" onclick="addFaq()">+ নতুন FAQ</button>';
  }
  else if (def.type === 'features') {
    html += '<div class="section-editor"><label>শিরোনাম</label><input type="text" id="pgTitle" value="' + esc(data.title || '') + '"></div>';
    html += '<div class="section-editor"><label>সাবটাইটেল</label><input type="text" id="pgSubtitle" value="' + esc(data.subtitle || '') + '"></div>';
    var feats = data.features || [];
    feats.forEach(function(f, i){
      html += '<div class="section-editor"><div class="sec-header"><h3>ফিচার ' + (i+1) + '</h3><button class="btn-remove" onclick="removeFeature(' + i + ')">✕ সরান</button></div>';
      html += '<div style="display:grid;grid-template-columns:80px 1fr;gap:12px;">';
      html += '<div><label>আইকন</label><input type="text" id="featIcon_' + i + '" value="' + esc(f.icon || '') + '" style="text-align:center;font-size:20px;"></div>';
      html += '<div><label>শিরোনাম</label><input type="text" id="featTitle_' + i + '" value="' + esc(f.title || '') + '"></div></div>';
      html += '<label style="margin-top:8px;">বিবরণ</label><input type="text" id="featDesc_' + i + '" value="' + esc(f.desc || '') + '"></div>';
    });
    html += '<button class="btn-add" onclick="addFeature()">+ নতুন ফিচার</button>';
  }
  else if (def.type === 'benefits') {
    html += '<div class="section-editor"><label>শিরোনাম</label><input type="text" id="pgTitle" value="' + esc(data.title || '') + '"></div>';
    html += '<div class="section-editor"><label>সাবটাইটেল</label><input type="text" id="pgSubtitle" value="' + esc(data.subtitle || '') + '"></div>';
    var bens = data.benefits || [];
    bens.forEach(function(b, i){
      html += '<div class="section-editor"><div class="sec-header"><h3>বেনিফিট ' + (i+1) + '</h3><button class="btn-remove" onclick="removeBenefit(' + i + ')">✕ সরান</button></div>';
      html += '<div style="display:grid;grid-template-columns:80px 1fr;gap:12px;">';
      html += '<div><label>আইকন</label><input type="text" id="benIcon_' + i + '" value="' + esc(b.icon || '') + '" style="text-align:center;font-size:20px;"></div>';
      html += '<div><label>শিরোনাম</label><input type="text" id="benTitle_' + i + '" value="' + esc(b.title || '') + '"></div></div>';
      html += '<label style="margin-top:8px;">বিবরণ</label><input type="text" id="benDesc_' + i + '" value="' + esc(b.desc || '') + '"></div>';
    });
    html += '<button class="btn-add" onclick="addBenefit()">+ নতুন বেনিফিট</button>';
  }

  html += '<button class="btn-save" onclick="savePage()">💾 সংরক্ষণ করুন</button>';
  el.innerHTML = html;
  if (def.type === 'home') {
    loadCategoriesForSections();
    var cs = allData[key].customSections || [];
    cs.forEach(function(_, i) { if (document.getElementById('hsType_' + i)) toggleHomeSectionFields(i); });
  }
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function savePage() {
  var def = pageDefs.find(function(p){return p.key === currentPage;});
  var data = allData[currentPage] || {};

  data.title = document.getElementById('pgTitle') ? document.getElementById('pgTitle').value : data.title;
  var sub = document.getElementById('pgSubtitle');
  if (sub) data.subtitle = sub.value;

  if (def.type === 'home') {
    data.flashTitle = document.getElementById('homeFlashTitle') ? document.getElementById('homeFlashTitle').value : '';
    data.flashTitleEn = document.getElementById('homeFlashTitleEn') ? document.getElementById('homeFlashTitleEn').value : '';
    data.flashAll = document.getElementById('homeFlashAll') ? document.getElementById('homeFlashAll').value : '';
    data.flashAllEn = document.getElementById('homeFlashAllEn') ? document.getElementById('homeFlashAllEn').value : '';
    data.catTitle = document.getElementById('homeCatTitle') ? document.getElementById('homeCatTitle').value : '';
    data.catTitleEn = document.getElementById('homeCatTitleEn') ? document.getElementById('homeCatTitleEn').value : '';
    data.jfyTitle = document.getElementById('homeJfyTitle') ? document.getElementById('homeJfyTitle').value : '';
    data.jfyTitleEn = document.getElementById('homeJfyTitleEn') ? document.getElementById('homeJfyTitleEn').value : '';
    data.jfySeeAll = document.getElementById('homeJfySeeAll') ? document.getElementById('homeJfySeeAll').value : '';
    data.jfySeeAllEn = document.getElementById('homeJfySeeAllEn') ? document.getElementById('homeJfySeeAllEn').value : '';
    data.moreBtn = document.getElementById('homeMoreBtn') ? document.getElementById('homeMoreBtn').value : '';
    data.moreBtnEn = document.getElementById('homeMoreBtnEn') ? document.getElementById('homeMoreBtnEn').value : '';
    data.columns = document.getElementById('homeColumns') ? document.getElementById('homeColumns').value : '4';

    data.customSections = [];
    var i = 0;
    while (document.getElementById('hsType_' + i)) {
      data.customSections.push({
        type: document.getElementById('hsType_' + i).value,
        show: document.getElementById('hsShow_' + i).value === '1',
        title: document.getElementById('hsTitle_' + i) ? document.getElementById('hsTitle_' + i).value : '',
        titleEn: document.getElementById('hsTitleEn_' + i) ? document.getElementById('hsTitleEn_' + i).value : '',
        categorySlug: document.getElementById('hsCat_' + i) ? document.getElementById('hsCat_' + i).value : '',
        text: document.getElementById('hsText_' + i) ? document.getElementById('hsText_' + i).value : '',
        textEn: document.getElementById('hsTextEn_' + i) ? document.getElementById('hsTextEn_' + i).value : '',
        limit: document.getElementById('hsLimit_' + i) ? document.getElementById('hsLimit_' + i).value : '8'
      });
      i++;
    }
  }
  else if (def.type === 'products_page') {
    data.title = document.getElementById('prodTitle') ? document.getElementById('prodTitle').value : '';
    data.titleEn = document.getElementById('prodTitleEn') ? document.getElementById('prodTitleEn').value : '';
    data.sortLabel = document.getElementById('prodSortLabel') ? document.getElementById('prodSortLabel').value : '';
    data.sortLabelEn = document.getElementById('prodSortLabelEn') ? document.getElementById('prodSortLabelEn').value : '';
    data.sidebarTitle = document.getElementById('prodSidebarTitle') ? document.getElementById('prodSidebarTitle').value : '';
    data.sidebarTitleEn = document.getElementById('prodSidebarTitleEn') ? document.getElementById('prodSidebarTitleEn').value : '';
    data.aiTitle = document.getElementById('prodAiTitle') ? document.getElementById('prodAiTitle').value : '';
    data.aiTitleEn = document.getElementById('prodAiTitleEn') ? document.getElementById('prodAiTitleEn').value : '';
    data.emptyTitle = document.getElementById('prodEmptyTitle') ? document.getElementById('prodEmptyTitle').value : '';
    data.emptyTitleEn = document.getElementById('prodEmptyTitleEn') ? document.getElementById('prodEmptyTitleEn').value : '';
    data.emptyHint = document.getElementById('prodEmptyHint') ? document.getElementById('prodEmptyHint').value : '';
    data.emptyHintEn = document.getElementById('prodEmptyHintEn') ? document.getElementById('prodEmptyHintEn').value : '';
    data.breadHome = document.getElementById('prodBreadHome') ? document.getElementById('prodBreadHome').value : '';
    data.breadHomeEn = document.getElementById('prodBreadHomeEn') ? document.getElementById('prodBreadHomeEn').value : '';
    data.breadProducts = document.getElementById('prodBreadProducts') ? document.getElementById('prodBreadProducts').value : '';
    data.breadProductsEn = document.getElementById('prodBreadProductsEn') ? document.getElementById('prodBreadProductsEn').value : '';
  }
  else if (def.type === 'sections' || def.type === 'steps') {
    data.sections = [];
    var i = 0;
    while (document.getElementById('secTitle_' + i)) {
      data.sections.push({ title: document.getElementById('secTitle_' + i).value, content: document.getElementById('secContent_' + i).value });
      i++;
    }
  }
  else if (def.type === 'blog') {
    data.posts = [];
    var i = 0;
    while (document.getElementById('postTitle_' + i)) {
      data.posts.push({ title: document.getElementById('postTitle_' + i).value, date: document.getElementById('postDate_' + i).value, tag: document.getElementById('postTag_' + i).value, desc: document.getElementById('postDesc_' + i).value });
      i++;
    }
  }
  else if (def.type === 'faq') {
    data.faqs = [];
    var i = 0;
    while (document.getElementById('faqQ_' + i)) {
      data.faqs.push({ q: document.getElementById('faqQ_' + i).value, a: document.getElementById('faqA_' + i).value });
      i++;
    }
  }
  else if (def.type === 'features') {
    data.features = [];
    var i = 0;
    while (document.getElementById('featTitle_' + i)) {
      data.features.push({ icon: document.getElementById('featIcon_' + i).value, title: document.getElementById('featTitle_' + i).value, desc: document.getElementById('featDesc_' + i).value });
      i++;
    }
  }
  else if (def.type === 'benefits') {
    data.benefits = [];
    var i = 0;
    while (document.getElementById('benTitle_' + i)) {
      data.benefits.push({ icon: document.getElementById('benIcon_' + i).value, title: document.getElementById('benTitle_' + i).value, desc: document.getElementById('benDesc_' + i).value });
      i++;
    }
  }

  allData[currentPage] = data;
  var body = {};
  body[currentPage] = data;
  var curToken = localStorage.getItem('adminToken') || token;
  fetch('/api/admin/settings', { method: 'PUT', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + curToken }, body: JSON.stringify(body) })
  .then(function(r){ if (!r.ok) throw new Error(r.status); return r.json(); }).then(function(){
    toast('সংরক্ষিত হয়েছে!', 'success');
  }).catch(function(){ toast('সংরক্ষণ ব্যর্থ। আবার লগইন করুন।', 'error'); });
}

function addSection() {
  var d = allData[currentPage] || {};
  if (!d.sections) d.sections = [];
  d.sections.push({ title: '', content: '' });
  allData[currentPage] = d;
  renderEditor(currentPage);
}
function removeSection(i) {
  var d = allData[currentPage]; if(d.sections) d.sections.splice(i,1);
  renderEditor(currentPage);
}
function addPost() {
  var d = allData[currentPage] || {};
  if (!d.posts) d.posts = [];
  d.posts.push({ title: '', date: '', tag: '', desc: '' });
  allData[currentPage] = d;
  renderEditor(currentPage);
}
function removePost(i) {
  var d = allData[currentPage]; if(d.posts) d.posts.splice(i,1);
  renderEditor(currentPage);
}
function addFaq() {
  var d = allData[currentPage] || {};
  if (!d.faqs) d.faqs = [];
  d.faqs.push({ q: '', a: '' });
  allData[currentPage] = d;
  renderEditor(currentPage);
}
function removeFaq(i) {
  var d = allData[currentPage]; if(d.faqs) d.faqs.splice(i,1);
  renderEditor(currentPage);
}
function addFeature() {
  var d = allData[currentPage] || {};
  if (!d.features) d.features = [];
  d.features.push({ icon: '✨', title: '', desc: '' });
  allData[currentPage] = d;
  renderEditor(currentPage);
}
function removeFeature(i) {
  var d = allData[currentPage]; if(d.features) d.features.splice(i,1);
  renderEditor(currentPage);
}
function addBenefit() {
  var d = allData[currentPage] || {};
  if (!d.benefits) d.benefits = [];
  d.benefits.push({ icon: '✅', title: '', desc: '' });
  allData[currentPage] = d;
  renderEditor(currentPage);
}
function removeBenefit(i) {
  var d = allData[currentPage]; if(d.benefits) d.benefits.splice(i,1);
  renderEditor(currentPage);
}
function addHomeSection(type) {
  var d = allData['page_home'] || {};
  if (!d.customSections) d.customSections = [];
  d.customSections.push({ type: type || 'text', title: '', titleEn: '', image: '', link: '', text: '', textEn: '' });
  allData['page_home'] = d;
  renderEditor('page_home');
}
function removeHomeSection(i) {
  var d = allData['page_home'] || {};
  if (d.customSections) d.customSections.splice(i, 1);
  allData['page_home'] = d;
  renderEditor('page_home');
}
function moveHomeSection(i, dir) {
  var d = allData['page_home'] || {};
  var arr = d.customSections || [];
  var ni = i + dir;
  if (ni < 0 || ni >= arr.length) return;
  var tmp = arr[i]; arr[i] = arr[ni]; arr[ni] = tmp;
  d.customSections = arr;
  allData['page_home'] = d;
  renderEditor('page_home');
}
function toggleHomeSectionFields(i) {
  var type = document.getElementById('hsType_' + i).value;
  var extra = document.getElementById('hsExtra_' + i);
  if (!extra) return;
  extra.querySelectorAll('[class*="hs-type-"]').forEach(function(el) {
    var classes = el.className.split(' ');
    var show = false;
    classes.forEach(function(c) { if (c === 'hs-type-' + type) show = true; });
    el.style.display = show ? '' : 'none';
  });
}
function loadCategoriesForSections() {
  fetch('/api/categories').then(function(r){return r.json()}).then(function(cats){
    var selects = document.querySelectorAll('[id^="hsCat_"]');
    selects.forEach(function(sel) {
      var val = sel.value;
      sel.innerHTML = '<option value="">-- ক্যাটাগরি বাছাই করুন --</option>' +
        cats.map(function(c){ return '<option value="' + c.slug + '"' + (val === c.slug ? ' selected' : '') + '>' + (c.name || c.en_name || c.slug) + '</option>'; }).join('');
    });
  });
}
function uploadHomeBanner(input, idx) {
  if (!input.files || !input.files[0]) return;
  var tk = localStorage.getItem('adminToken');
  if (!tk) return;
  var fd = new FormData();
  fd.append('image', input.files[0]);
  fetch('/api/admin/upload?type=banner', { method: 'POST', headers: { 'Authorization': 'Bearer ' + tk }, body: fd })
    .then(function(r) { return r.json(); })
    .then(function(res) {
      if (res.error) { toast(res.error, 'error'); return; }
      var field = document.getElementById('hsImage_' + idx);
      if (field && res.url) { field.value = res.url; toast('আপলোড হয়েছে!', 'success'); }
    }).catch(function() { toast('আপলোড ব্যর্থ', 'error'); });
}

if (token) loadPages();
</script>
</body>
</html>
